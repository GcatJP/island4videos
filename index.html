<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
          maximum-scale=1.0, user-scalable=no"
    />

    <!-- iOS Home Screen behaviour -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Adventure Island" />

    <!-- App icons (multiple resolutions) -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/Ai4.180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="images/Ai4.167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="images/Ai4.152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="images/Ai4.120.png" />

    <link rel="manifest" href="manifest.json" />

    <title>Adventure Island 4</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --font-chalk:
          "Chalkboard SE", "Chalkboard", "Comic Neue", "Comic Sans MS", cursive;
        --colour-btn-face: #ffd600;
        --colour-btn-active: #ffc200;
        --colour-btn-border: #000000;
        --colour-heading-text: orange;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        max-width: 100vw;
      }

      body {
        font-family: var(--font-chalk);
        background: linear-gradient(to bottom, #6593f6, #08328c);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        transition: background 0.3s ease;
      }

      h1 {
        font-family: var(--font-chalk);
        color: var(--colour-heading-text);
        width: 100%;
        text-align: center;
        letter-spacing: 0.03em;
        flex-shrink: 0;
        -webkit-text-stroke: 2px yellow;
      }

      .grid-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      .btn {
        font-family: var(--font-chalk);
        font-weight: bold;
        color: yellow;
        background: var(--colour-btn-face);
        border: 2px solid var(--colour-btn-border);
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-text-stroke: 2px orange;
        transition:
          transform 0.1s ease,
          background 0.15s ease;
      }

      .btn:active {
        transform: scale(0.97);
        background: var(--colour-btn-active);
      }

      .corner-img {
        position: fixed;
        bottom: 0;
        right: 0;
        pointer-events: none;
        z-index: 10;
      }

      /* LANDSCAPE */
      @media screen and (orientation: landscape) {
        body {
          background: linear-gradient(to bottom, #c7e3f4, #3f81a9);
          overflow: hidden;
        }

        h1 {
          font-size: clamp(2rem, 7vw, 7rem);
          padding: 0.1em 0.5em;
          margin-top: 5vh;
          margin-bottom: -8vh;
        }

        .grid-wrapper {
          padding: 1vh 2vw 2vh;
          margin-top: 2vh;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          grid-template-rows: 1fr;
          gap: clamp(6px, 1.4vw, 16px);
          width: min(94vw, 920px);
        }

        .btn {
          font-size: clamp(1rem, 6vw, 4rem);
          height: clamp(60px, 35vh, 180px);
        }

        .corner-img {
          top: 0;
          right: 0;
          bottom: auto;
          width: clamp(60px, 12vw, 160px);
          margin-top: 30px;
          margin-right: 30px;
        }
      }

      /* LANDSCAPE IPHONE */
      @media screen and (orientation: landscape) and (max-height: 450px) {
        body {
          background: linear-gradient(to bottom, #c7e3f4, #3f81a9);
          width: 100vw !important;
          min-width: 100vw !important;
          overflow-x: hidden !important;
        }

        h1 {
          font-size: clamp(1rem, 7vw, 4rem) !important;
          padding: 0.1em 0.5em !important;
          margin-top: -3vh !important;
          margin-bottom: -8vh !important;
        }

        .grid-wrapper {
          padding: 1vh 6vw 2vh;
          margin-top: 1vh;
        }

        .btn {
          height: clamp(40px, 28vh, 100px) !important;
          font-size: clamp(0.9rem, 5vw, 3rem) !important;
        }

        .corner-img {
          width: clamp(40px, 8vw, 80px);
        }
      }

      /* PORTRAIT */
      @media screen and (orientation: portrait) {
        body {
          overflow-y: auto;
          background: linear-gradient(to bottom, #c7e3f4, #3f81a9);
        }

        h1 {
          font-size: clamp(1.5rem, 12vw, 4rem);
          padding: 0.3em 0.5em;
        }

        .grid-wrapper {
          padding: 2vw 9vw 16vw;
        }

        .grid {
          display: grid;
          grid-template-columns: 1fr;
          gap: clamp(10px, 10vw, 100px);
          width: 100%;
          max-width: 480px;
        }

        .btn {
          font-size: clamp(1rem, 10vw, 4rem);
          height: clamp(70px, 30vw, 300px);
        }

        .corner-img {
          width: clamp(60px, 20vw, 130px);
          margin-bottom: 30px;
          margin-right: 30px;
        }
      }

      /* PORTRAIT IPHONE */
      @media screen and (orientation: portrait) and (max-width: 430px) {
        .corner-img {
          width: clamp(30px, 13vw, 80px) !important;
        }

        h1 {
          font-size: clamp(1.2rem, 12vw, 4rem) !important;
          padding: 0.3em 0.5em !important;
          -webkit-text-stroke: 1.5px yellow;
          line-height: 1;
        }

        .grid-wrapper {
          padding: 0 9vw 2vw !important;
          margin-top: 0 !important;
          align-items: flex-start !important;
          justify-content: flex-start !important;
          flex-direction: column !important;
          padding-top: 5vh !important;
        }

        .grid {
          gap: 30px !important;
          width: 100% !important;
        }

        .btn {
          height: clamp(70px, 25vw, 120px) !important;
          font-size: clamp(0.9rem, 10vw, 3rem) !important;
        }
      }
    </style>
  </head>

  <body>
    <h1>Adventure Island 4</h1>

    <div class="grid-wrapper">
      <div class="grid" id="main-grid">
        <a
          class="btn"
          href="Units4_1-10.html"
          style="background-color: #28756d"
        >
          Units 1–10
        </a>
        <a
          class="btn"
          href="Units4_11-20.html"
          style="background-color: #28756d"
        >
          Units 11–20
        </a>
      </div>
    </div>

    <img
      class="corner-img"
      src="images/Kevin4.2.png"
      alt=""
      aria-hidden="true"
    />
  </body>
</html>
